name: Publish extension

# 확장을 Chrome Web Store 에 업로드·게시.
# - 자동: ext-v* 태그 푸시 → 업로드 + 심사 제출(게시)
# - 수동: Actions 탭 → Run workflow (publish 체크 시 게시, 해제 시 초안 업로드만)
on:
  push:
    tags: ["ext-v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "업로드 후 심사 제출(게시)까지 할지"
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show version
        run: node -e "console.log('manifest version:', require('./extension/manifest.json').version)"

      - name: Package extension zip
        run: |
          cd extension
          zip -r -X ../algo-study-extension.zip . -x '*.DS_Store' -x '*.md' -x '*.test.js'
          cd ..
          unzip -l algo-study-extension.zip

      - name: Upload & publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: algo-study-extension.zip
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          # 태그 푸시는 게시까지, 수동 실행은 입력값에 따름
          publish: ${{ github.event_name == 'push' || inputs.publish }}
